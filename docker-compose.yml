services:
  postgres:
    image: postgres:16-alpine
    container_name: patient-qa-db
    environment:
      POSTGRES_USER: patient_qa
      POSTGRES_PASSWORD: patient_qa
      POSTGRES_DB: patient_qa
    ports:
      - '5432:5432'
    volumes:
      - patient_qa_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U patient_qa -d patient_qa']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  patient_qa_pg:
